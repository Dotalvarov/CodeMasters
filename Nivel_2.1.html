<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="página pedagógica para html5" />
  <meta name="keywords" content="html, html5, java, javascript, css, css3" />
  <title>ARRASTRA Y PEGA 2</title>
  <link rel="stylesheet" href="css/arrastraypega2.css">
  <script src="JavaScript/sweetalert2.all.min.js"></script>
  <script src="JavaScript/Arrastra y pega2.js"></script>
  <script src="JavaScript/ayuda.js"></script>
  <link rel="shortcut icon" href="IMAGENES/Fondosylogos/Logo2.png">

</head>

<body>
  <div id="principal">
    <div id="marco">
      <img src="IMAGENES/arrastraypega/marco prime.png">

      <section id="cajaimagenes">

        <img id="1" src="IMAGENES/arrastraypega/iniciar.png">
        <img id="2" src="IMAGENES/arrastraypega/girar.png">
        <img id="3" src="IMAGENES/arrastraypega/mover.png">
        <img id="4" src="IMAGENES/arrastraypega/xd.png">
        <img id="5" src="IMAGENES/arrastraypega/condicional.png">
      </section>
      <div id="marco_r">

        <section id="respuestas">
          <section class="zonadestino" id="1">Rotación</section>
          <section class="zonadestino" id="2">Control</section>
          <section class="zonadestino" id="3">Salida de texto</section>
          <section class="zonadestino" id="4">Movimiento lineal</section>
          <section class="zonadestino" id="5">Evento</section>
        </section>
      </div>
    </div>
  </div>



  <div class="masc">
    <button id="boton">
      <img src="IMAGENES/Pantalla de carga/tortugapixel.png" alt="">
    </button>
  </div>
  <div class="contenedor" id="contenedor">
    <div class="ayuda">
      <img src="IMAGENES/Sopa de letras/marco-sopa.png" alt="">
      <p class="p" id="mensaje">
        En el juego Arrastra y pega. Mueve la imagen a donde corresponde
      </p>
      <br></br>
      <button type="button" id="close" value="close">
        <img src="IMAGENES/botones/cerrar.png">
      </button>
    </div>
  </div>
  <div id="need">¿Necesitas ayuda?</div>
  <div class="letra"><img src="IMAGENES/Fondosylogos/marco-sub.png" alt="">
    <h1>Nivel 2.1</h1>
  </div>
</body>

</html>
